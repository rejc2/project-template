# yaml-language-server: $schema=https://render.com/schema/render.yaml.json

version: "1"

projects:
  - name: project-template
    environments:
      - name: Production

        services:
          # =========================
          # API SERVER
          # =========================
          - name: project-template-server
            type: web
            runtime: node
            plan: free
            autoDeployTrigger: "commit"

            buildFilter:
              paths:
                - apps/server/**
                - packages/**

            buildCommand: corepack enable && yarn install --immutable && yarn workspaces foreach --from @rejc2/project-template-server --recursive --topological run build
            startCommand: yarn workspace @rejc2/project-template-server prisma:migrate && yarn workspace @rejc2/project-template-server start

            healthCheckPath: /health

            # domains:
            #   - api.project-template.app

            envVars:
              - key: CORS_ORIGIN_HOST
                fromService:
                  name: project-template-web
                  property: host
                  type: web
              - key: DATABASE_URL
                fromDatabase:
                  name: project-template-db
                  property: connectionString
              - key: GOOGLE_CLIENT_ID
                sync: false
              - key: GOOGLE_CLIENT_SECRET
                sync: false
              - key: NODE_ENV
                value: production
              - key: REDIS_URL
                fromService:
                  name: project-template-redis
                  property: connectionString
                  type: redis
              - key: SESSION_SECRET
                generateValue: true

            previews:
              generation: manual

          # =========================
          # FRONTEND STATIC SITE
          # =========================
          - name: project-template-web
            type: web
            runtime: static
            autoDeployTrigger: "commit"

            buildFilter:
              paths:
                - apps/web/**
                - packages/**

            buildCommand: corepack enable && yarn install --immutable && yarn workspaces foreach --from @rejc2/project-template-web --recursive --topological run build
            staticPublishPath: apps/web/dist

            routes:
              # Rewrites all paths to index.html for client-side routing
              - type: rewrite
                source: /*
                destination: /index.html

            # domains:
            #   - project-template.app
            #   - www.project-template.app

            envVars:
              - key: SKIP_INSTALL_DEPS
                value: "true"
              - key: VITE_API_HOST
                fromService:
                  name: project-template-server
                  property: host
                  type: web

            previews:
              generation: manual

          # =========================
          # REDIS
          # =========================
          - type: redis
            name: project-template-redis
            plan: free
            ipAllowList: [] # allow internal connections only

        databases:
          # =========================
          # POSTGRES DB
          # =========================
          - name: project-template-db
            databaseName: projecttemplate
            plan: free
            previewPlan: free
