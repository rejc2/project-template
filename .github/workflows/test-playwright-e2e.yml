# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Playwright E2E Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  playwright-e2e:
    name: "Playwright E2E Tests"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: projecttemplate
          POSTGRES_PASSWORD: projecttemplate
          POSTGRES_DB: projecttemplate
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U projecttemplate"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run Playwright tests (container)
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}:/work \
            -w /work \
            mcr.microsoft.com/playwright:v1.58.0-noble \
            bash -c "yarn install && yarn workspace @rejc2/projecttemplate-playwright-e2e playwright"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: test-packages/playwright-e2e/playwright-report/
          retention-days: 30
