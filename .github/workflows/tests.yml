name: Tests

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

jobs:
   unit-tests:
      name: Unit Tests (apps/web)
      runs-on: ubuntu-latest

      steps:
         - uses: actions/checkout@v4

         - name: Setup Node.js
           uses: actions/setup-node@v4
           with:
              node-version: '20'

         - name: Enable Corepack
           run: corepack enable

         - name: Install dependencies
           run: yarn install --immutable

         - name: Run unit tests
           run: yarn workspace @rejc2/project-template-web test --run

   playwright-tests:
      name: Playwright Tests
      runs-on: ubuntu-latest

      steps:
         - uses: actions/checkout@v4

         - name: Setup Node.js
           uses: actions/setup-node@v4
           with:
              node-version: '20'

         - name: Enable Corepack
           run: corepack enable

         - name: Install dependencies
           run: yarn install --immutable

         - name: Install Playwright browsers
           run: yarn workspace @rejc2/project-template-playwright-tests exec playwright install --with-deps chromium

         - name: Run Playwright tests
           run: yarn workspace @rejc2/project-template-playwright-tests test

         - name: Upload Playwright report
           uses: actions/upload-artifact@v4
           if: ${{ !cancelled() }}
           with:
              name: playwright-report
              path: test-packages/playwright-tests/playwright-report/
              retention-days: 30
