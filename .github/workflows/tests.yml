name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml-schema:
    name: YAML Schema Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Validate YAML schemas
        run: yarn validate:yaml

  unit-tests:
    name: Unit Tests (apps/web)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Check types
        run: yarn typecheck

      - name: Lint (errors only)
        run: yarn lint

      - name: Run unit tests
        run: yarn test

  final-lint:
    name: Final lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint (strict)
        run: yarn lint:strict

      - name: Check formatting
        run: yarn format:check

  playwright-e2e:
    name: "Playwright E2E Tests"
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
      options: --user 1001

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run Playwright tests
        run: yarn workspace @rejc2/projecttemplate-playwright-e2e playwright

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: test-packages/playwright-e2e/playwright-report/
          retention-days: 30
