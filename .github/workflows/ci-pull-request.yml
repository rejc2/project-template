# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: PR Tests

on:
  pull_request:
    branches: [main]

jobs:
  yaml-schema:
    name: YAML Schema Validation
    uses: ./.github/workflows/test-yaml-schema.yml

  unit-tests:
    name: Unit Tests
    uses: ./.github/workflows/test-unit-tests.yml

  final-lint:
    name: Final Lint
    uses: ./.github/workflows/test-final-lint.yml

  i18n:
    name: i18n Check
    uses: ./.github/workflows/test-i18n.yml

  playwright-e2e:
    name: Playwright E2E Tests
    uses: ./.github/workflows/test-playwright-e2e.yml
