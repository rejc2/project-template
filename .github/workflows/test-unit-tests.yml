# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Unit Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests (apps/web)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Check types
        run: yarn typecheck

      - name: Lint (errors only)
        run: yarn lint

      - name: Run unit tests
        run: yarn test
